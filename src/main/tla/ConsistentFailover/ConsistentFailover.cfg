\* TLC model configuration for ConsistentFailover.tla
\*
\* Primary (exhaustive) model: 2 clusters.
\*
\* Run:
\* java -XX:+UseParallelGC \
\*   -cp tla2tools.jar:CommunityModules-deps.jar \
\*   tlc2.TLC ConsistentFailover.tla -config ConsistentFailover.cfg \
\*   -workers auto -cleanup

SPECIFICATION Spec

\* Model values
CONSTANTS
    \* The finite set of cluster identifiers forming the HA pair.
    Cluster = {c1, c2}

\* Invariants to check
INVARIANT
    TypeOK
    MutualExclusion
    ActiveToStandbyNotActive
    AbortSafety

\* Action property: every state change follows AllowedTransitions
ACTION_CONSTRAINT
    TransitionValid
