\* TLC model configuration for ConsistentFailover.tla
\*
\* Primary (exhaustive) model: 2 clusters, 2 region servers.
\*
\* Run:
\* java -XX:+UseParallelGC \
\*   -cp tla2tools.jar:CommunityModules-deps.jar \
\*   tlc2.TLC ConsistentFailover.tla -config ConsistentFailover.cfg \
\*   -workers auto -cleanup

SPECIFICATION Spec

\* Model values
CONSTANTS
    \* The finite set of cluster identifiers forming the HA pair.
    Cluster = {c1, c2}
    \* The finite set of region server identifiers per cluster.
    RS = {rs1, rs2}

\* Symmetry reduction: RS identifiers are interchangeable.
SYMMETRY Symmetry

\* Invariants to check
INVARIANT
    TypeOK
    WriterTypeOK
    OutDirTypeOK
    HDFSTypeOK
    MutualExclusion
    AbortSafety
    NonAtomicFailoverSafe
    AISImpliesInSync
    NoAISWithSFWriter
    WriterClusterConsistency

\* Action properties: every state change follows allowed transitions
ACTION_CONSTRAINT
    TransitionValid
    WriterTransitionValid
    AIStoATSPrecondition
